<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_kopi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_kopi)"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="255" rx="55" ry="14" fill="#451a03" opacity="0.3"/>

  <!-- Plastic Cup 2D Flat -->
  <path d="M 155 100 L 170 240 Q 200 250 230 240 L 245 100 Z" fill="#ffffff" opacity="0.85" stroke="#fef3c7" stroke-width="4"/>
  <ellipse cx="200" cy="100" rx="45" ry="12" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="3"/>
  
  <!-- Coffee Drink Layer -->
  <path d="M 160 130 L 170 238 Q 200 246 230 238 L 240 130 Z" fill="#78350f"/>
  
  <!-- Milk Layer Foam Top -->
  <ellipse cx="200" cy="130" rx="40" ry="10" fill="#fffbeb"/>
  <path d="M 160 130 Q 180 150 200 135 T 240 130 Z" fill="#fef3c7"/>

  <!-- Straw 2D -->
  <rect x="205" y="40" width="10" height="170" rx="4" transform="rotate(12 205 40)" fill="#06b6d4"/>

  <!-- Coffee Beans Decorative 2D Flat -->
  <g transform="translate(90, 160) rotate(-20)">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="#451a03"/>
    <path d="M -10 0 Q 0 8 10 0" stroke="#fef3c7" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(300, 180) rotate(35)">
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#451a03"/>
    <path d="M -12 0 Q 0 9 12 0" stroke="#fef3c7" stroke-width="2" fill="none"/>
  </g>

  <!-- Badge Text -->
  <rect x="20" y="20" width="145" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="92" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#78350f" text-anchor="middle">☕ KOPI GULA AREN</text>
</svg>
