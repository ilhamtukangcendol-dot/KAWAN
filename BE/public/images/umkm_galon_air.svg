<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_galon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_galon)"/>
  
  <!-- Water Gallon Bottle 2D Flat -->
  <rect x="120" y="110" width="90" height="120" rx="18" fill="#38bdf8" stroke="#7dd3fc" stroke-width="4" opacity="0.9"/>
  <rect x="145" y="80" width="40" height="30" fill="#38bdf8" stroke="#7dd3fc" stroke-width="4"/>
  <rect x="150" y="65" width="30" height="15" fill="#2563eb"/> <!-- Cap -->
  
  <!-- Water Wave inside Gallon -->
  <path d="M 122 150 Q 140 160 165 150 T 208 150 V 212 Q 165 228 122 212 Z" fill="#0284c7" opacity="0.6"/>

  <!-- Gas Tank LPG 3kg Bright Green 2D Flat -->
  <rect x="235" y="130" width="70" height="90" rx="20" fill="#22c55e" stroke="#16a34a" stroke-width="4"/>
  <rect x="250" y="105" width="40" height="25" fill="#16a34a"/>
  <rect x="260" y="95" width="20" height="10" fill="#dc2626"/> <!-- Red Valve -->
  <text x="270" y="175" font-family="sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">LPG 3KG</text>

  <!-- Badge Text -->
  <rect x="20" y="20" width="145" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="92" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#0369a1" text-anchor="middle">💧 GALON &amp; LPG RT</text>
</svg>
