<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#feb47b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg)"/>
  
  <!-- Table Top -->
  <ellipse cx="200" cy="240" rx="160" ry="40" fill="#e2e8f0" opacity="0.2"/>
  
  <!-- Bowl Outer -->
  <path d="M 100 150 C 100 240, 300 240, 300 150 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="6"/>
  <ellipse cx="200" cy="150" rx="100" ry="25" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4"/>
  
  <!-- Soup Broth -->
  <ellipse cx="200" cy="153" rx="94" ry="20" fill="#fef08a"/>
  
  <!-- Noodles -->
  <path d="M 130 150 Q 150 170 170 150 T 210 160 T 250 150" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
  <path d="M 140 160 Q 160 180 180 155 T 230 165" fill="none" stroke="#fef08a" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Bakso Meatballs (2D Flat) -->
  <circle cx="170" cy="145" r="24" fill="#94a3b8" stroke="#64748b" stroke-width="4"/>
  <circle cx="225" cy="148" r="22" fill="#94a3b8" stroke="#64748b" stroke-width="4"/>
  <circle cx="195" cy="165" r="20" fill="#64748b" stroke="#475569" stroke-width="4"/>
  <circle cx="145" cy="160" r="16" fill="#cbd5e1" stroke="#94a3b8" stroke-width="3"/>

  <!-- Scallions & Chili -->
  <circle cx="180" cy="150" r="4" fill="#22c55e"/>
  <circle cx="210" cy="140" r="5" fill="#22c55e"/>
  <circle cx="240" cy="155" r="4" fill="#ef4444"/>
  <circle cx="160" cy="165" r="5" fill="#ef4444"/>
  
  <!-- Steam Curves (2D Animation Line) -->
  <path d="M 160 110 Q 150 90 165 70" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 200 105 Q 215 85 200 65" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 240 115 Q 230 95 245 75" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <!-- Badge Text -->
  <rect x="20" y="20" width="130" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="85" y="42" font-family="sans-serif" font-weight="900" font-size="14" fill="#ea580c" text-anchor="middle">🍜 BAKSO SOLO</text>
</svg>
