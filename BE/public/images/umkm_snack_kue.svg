<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_kue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_kue)"/>
  
  <!-- Woven Bamboo Tray (Tampah) 2D Flat -->
  <ellipse cx="200" cy="180" rx="140" ry="60" fill="#d97706" stroke="#b45309" stroke-width="8"/>
  <ellipse cx="200" cy="180" rx="128" ry="50" fill="#15803d"/> <!-- Banana leaf lining -->

  <!-- Klepon Green Balls (2D Flat) -->
  <circle cx="130" cy="175" r="16" fill="#4ade80"/>
  <circle cx="130" cy="175" r="14" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 4"/> <!-- Coconut flakes -->

  <circle cx="160" cy="165" r="16" fill="#4ade80"/>
  <circle cx="160" cy="165" r="14" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 4"/>

  <circle cx="150" cy="190" r="16" fill="#4ade80"/>
  <circle cx="150" cy="190" r="14" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 4"/>

  <!-- Risoles Golden Brown 2D Flat -->
  <rect x="190" y="160" width="55" height="28" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="3"/>
  <rect x="210" y="180" width="55" height="28" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="3"/>

  <!-- Kue Lapis / Dampit Pink & White 2D Flat -->
  <g transform="translate(270, 160) rotate(-10)">
    <rect x="0" y="0" width="35" height="10" fill="#ec4899"/>
    <rect x="0" y="10" width="35" height="10" fill="#ffffff"/>
    <rect x="0" y="20" width="35" height="10" fill="#ec4899"/>
  </g>

  <!-- Badge Text -->
  <rect x="20" y="20" width="145" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="92" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#047857" text-anchor="middle">🍡 KUE BASAH &amp; SNACK</text>
</svg>
