<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_bengkel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_bengkel)"/>
  
  <!-- Motorcycle Wheel Rim 2D Flat -->
  <circle cx="150" cy="170" r="65" fill="none" stroke="#64748b" stroke-width="18"/>
  <circle cx="150" cy="170" r="65" fill="none" stroke="#1e293b" stroke-width="8"/>
  <circle cx="150" cy="170" r="20" fill="#cbd5e1" stroke="#475569" stroke-width="4"/>
  <line x1="150" y1="105" x2="150" y2="235" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="85" y1="170" x2="215" y2="170" stroke="#cbd5e1" stroke-width="3"/>

  <!-- Oil Bottle 2D Flat -->
  <rect x="250" y="130" width="60" height="95" rx="8" fill="#eab308"/>
  <rect x="265" y="105" width="30" height="25" fill="#ca8a04"/>
  <rect x="270" y="90" width="20" height="15" rx="3" fill="#ef4444"/> <!-- Red Cap -->
  <rect x="260" y="150" width="40" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="280" y="175" font-family="sans-serif" font-weight="900" font-size="14" fill="#ca8a04" text-anchor="middle">OLI</text>

  <!-- Wrench Tool 2D Flat -->
  <g transform="translate(190, 80) rotate(45)">
    <rect x="-8" y="-50" width="16" height="100" fill="#cbd5e1"/>
    <circle cx="0" cy="-50" r="16" fill="none" stroke="#cbd5e1" stroke-width="8"/>
  </g>

  <!-- Badge Text -->
  <rect x="20" y="20" width="145" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="92" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#0f172a" text-anchor="middle">🏍️ BENGKEL MOTOR</text>
</svg>
