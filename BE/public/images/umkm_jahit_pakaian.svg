<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_jahit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_jahit)"/>
  
  <!-- Sewing Machine Silhouette 2D -->
  <path d="M 100 220 H 300 V 235 H 100 Z" fill="#1e293b"/>
  <path d="M 230 220 V 120 H 130 C 110 120, 110 160, 130 160 H 170" fill="none" stroke="#1e293b" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Needle Assembly 2D -->
  <rect x="130" y="160" width="8" height="35" fill="#94a3b8"/>
  <polygon points="134,195 130,210 138,210" fill="#94a3b8"/>

  <!-- Fabric Roll 2D -->
  <rect x="250" y="150" width="40" height="70" rx="8" fill="#a855f7"/>
  <ellipse cx="270" cy="150" rx="20" ry="8" fill="#c084fc"/>

  <!-- Thread Spool 2D -->
  <rect x="200" y="80" width="22" height="35" rx="4" fill="#facc15"/>
  <line x1="211" y1="115" x2="134" y2="160" stroke="#facc15" stroke-width="3" stroke-dasharray="4"/>

  <!-- Measuring Tape 2D -->
  <path d="M 60 200 C 100 250, 180 250, 220 200 S 300 180, 340 230" fill="none" stroke="#fef08a" stroke-width="12" stroke-linecap="round"/>
  <path d="M 60 200 C 100 250, 180 250, 220 200 S 300 180, 340 230" fill="none" stroke="#000000" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- Badge Text -->
  <rect x="20" y="20" width="145" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="92" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#be185d" text-anchor="middle">✂️ PENJAHIT PAKAIAN</text>
</svg>
