<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_hp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_hp)"/>
  
  <!-- Desk Work Mat -->
  <rect x="50" y="80" width="300" height="180" rx="16" fill="#1e1b4b" opacity="0.6"/>
  
  <!-- Smartphone Outline 2D -->
  <rect x="150" y="100" width="100" height="140" rx="14" fill="#0f172a" stroke="#6366f1" stroke-width="4"/>
  <rect x="158" y="112" width="84" height="110" rx="6" fill="#38bdf8"/>
  
  <!-- Circuit Board Lines on Phone Screen -->
  <path d="M 170 130 H 210 V 170 H 230" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="230" cy="170" r="5" fill="#34d399"/>
  <circle cx="170" cy="130" r="5" fill="#f43f5e"/>

  <!-- Screwdriver 2D Flat -->
  <g transform="rotate(45 120 180)">
    <rect x="110" y="100" width="20" height="70" rx="6" fill="#f59e0b"/>
    <rect x="116" y="170" width="8" height="60" fill="#cbd5e1"/>
  </g>

  <!-- Pliers / Tools 2D Flat -->
  <g transform="rotate(-30 280 180)">
    <rect x="270" y="110" width="16" height="80" rx="8" fill="#ef4444"/>
    <rect x="290" y="110" width="16" height="80" rx="8" fill="#ef4444"/>
    <circle cx="288" cy="130" r="6" fill="#94a3b8"/>
  </g>

  <!-- Badge Text -->
  <rect x="20" y="20" width="140" height="34" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="90" y="42" font-family="sans-serif" font-weight="900" font-size="13" fill="#4338ca" text-anchor="middle">📱 SERVIS HP &amp; LAPTOP</text>
</svg>
